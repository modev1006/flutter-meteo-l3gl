name: meteo
description: Une application météo magique
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0 # Gardé pour compatibilité ou alternative
  google_maps_flutter: ^2.5.3
  latlong2: ^0.9.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  http: ^1.1.0
  dio: ^5.4.1
  retrofit: ^4.1.0
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.1
  intl: ^0.18.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  retrofit_generator: 8.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/